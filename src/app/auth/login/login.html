<div class="login-container">
  <div class="glass-card login-card">
    <div class="header">
      <img src="assets/emblem.png" alt="Logo" class="logo" onerror="this.style.display='none'">
      <h2 class="premium-title">विधायक जनसंतुष्टि पोर्टल</h2>
      <p class="subtitle">कृपया अपने क्रेडेंशियल्स दर्ज करें</p>
    </div>

    <form [formGroup]="loginForm" (ngSubmit)="onSubmit()">
      <mat-form-field appearance="outline" class="full-width">
        <mat-label>ईमेल (Email)</mat-label>
        <input matInput type="email" formControlName="email" placeholder="email@example.com">
        <mat-icon matPrefix>email</mat-icon>
        <mat-error *ngIf="loginForm.get('email')?.hasError('required')">
          ईमेल आवश्यक है।
        </mat-error>
        <mat-error *ngIf="loginForm.get('email')?.hasError('email')">
          कृपया वैध ईमेल दर्ज करें।
        </mat-error>
      </mat-form-field>

      <mat-form-field appearance="outline" class="full-width">
        <mat-label>पासवर्ड (Password)</mat-label>
        <input matInput [type]="hidePassword ? 'password' : 'text'" formControlName="password">
        <mat-icon matPrefix>lock</mat-icon>
        <button mat-icon-button matSuffix (click)="hidePassword = !hidePassword" type="button" [attr.aria-label]="'Hide password'" [attr.aria-pressed]="hidePassword">
          <mat-icon>{{hidePassword ? 'visibility_off' : 'visibility'}}</mat-icon>
        </button>
        <mat-error *ngIf="loginForm.get('password')?.hasError('required')">
          पासवर्ड आवश्यक है।
        </mat-error>
      </mat-form-field>

      <div class="actions">
        <a class="forgot-link">पासवर्ड भूल गए?</a>
      </div>

      <button mat-raised-button color="primary" class="login-button" type="submit" [disabled]="loginForm.invalid || isLoading">
        <mat-icon *ngIf="!isLoading">login</mat-icon>
        <span>{{ isLoading ? 'लॉगिन हो रहा है...' : 'लॉगिन करें (Login)' }}</span>
      </button>
    </form>
  </div>
</div>
